const MAX_VOTES = 4;
const BIN_ID_KEY = "camp_vote_bin_id";

// ==============================
// JSONBin API
// ==============================
async function loadVotes() {
  const res = await fetch(`${JSONBIN_BASE}/b/${JSONBIN_BIN_ID}/latest`, {
    headers: {
      "X-Master-Key": JSONBIN_API_KEY,
      "X-Access-Key": JSONBIN_API_KEY,
    },
  });
  const data = await res.json();
  return data.record.votes || [];
}

async function saveVotes(allVotes) {
  await fetch(`${JSONBIN_BASE}/b/${JSONBIN_BIN_ID}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": JSONBIN_API_KEY,
      "X-Access-Key": JSONBIN_API_KEY,
    },
    body: JSON.stringify({ votes: allVotes }),
  });
}

// ページ判定
// ==============================
function getPage() {
  try {
    return new URL(window.location.href).searchParams.get("view") === "results" ? "results" : "vote";
  } catch { return "vote"; }
}

    if (submitted) return;
    setVotes(p => p.includes(id) ? p.filter(v=>v!==id) : p.length < MAX_VOTES ? [...p,id] : p);
  };

    if (!userName.trim()) { setNameError("お名前を入力してください"); return; }

    try {
      const allVotes = await loadVotes();
      const filtered = allVotes.filter(v => v.name !== userName.trim());

      await saveVotes(filtered);
      setSubmitted(true);

        {/* 完了バナー */}
        {submitted && (
          <div style={{background:"linear-gradient(135deg,rgba(167,139,250,0.12),rgba(110,231,183,0.08))",border:"1px solid rgba(167,139,250,0.45)",borderRadius:"16px",padding:"22px",marginBottom:"26px",textAlign:"center"}}>
            <div style={{fontSize:"26px",marginBottom:"6px"}}>🎉</div>
            <div style={{fontSize:"16px",fontWeight:"bold",marginBottom:"4px"}}>投票完了！{userName} さんの選んだ4か所</div>
            <div style={{fontSize:"11px",color:"#9b8ea0",marginBottom:"14px"}}>結果ページで集計が確認できます</div>
            <div style={{display:"flex",gap:"8px",flexWrap:"wrap",justifyContent:"center",marginBottom:"14px"}}>

              ))}
            </div>
            <div style={{display:"flex",gap:"10px",justifyContent:"center",flexWrap:"wrap"}}>

                          {tab==="supermarket"&&camp.supermarket}
                        </div>
                        <div style={{padding:"9px 13px",borderTop:"1px solid rgba(255,255,255,0.05)",display:"flex",gap:"8px"}}>
                          <a href={camp.url} target="_blank" rel="noopener noreferrer" style={{fontSize:"11px",color:"#a78bfa",textDecoration:"none",padding:"5px 12px",border:"1px solid rgba(167,139,250,0.35)",borderRadius:"6px"}}>🔗 公式サイト</a>
                          <a href={camp.mapUrl} target="_blank" rel="noopener noreferrer" style={{fontSize:"11px",color:"#6ee7b7",textDecoration:"none",padding:"5px 12px",border:"1px solid rgba(110,231,183,0.35)",borderRadius:"6px"}}>📍 地図</a>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      {/* 下部バー */}
      {!submitted&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(15,12,41,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.08)",padding:"12px 16px"}}>
          <div style={{maxWidth:"800px",margin:"0 auto",display:"flex",gap:"10px",alignItems:"center",flexWrap:"wrap",justifyContent:"center"}}>
            <div style={{display:"flex",flexDirection:"column",gap:"2px"}}>
              <input type="text" placeholder="お名前を入力…" value={userName} onChange={e=>{setUserName(e.target.value);setNameError("");}} style={{background:"rgba(255,255,255,0.08)",border:`1px solid ${nameError?"#f87171":"rgba(255,255,255,0.18)"}`,borderRadius:"8px",padding:"9px 13px",color:"#f0ede8",fontSize:"13px",width:"150px",outline:"none",fontFamily:"inherit"}}/>
              {nameError&&<span style={{fontSize:"10px",color:"#f87171"}}>{nameError}</span>}
            </div>
            <span style={{fontSize:"12px",color:"#9b8ea0"}}>{votes.length<MAX_VOTES?`あと ${MAX_VOTES-votes.length} か所`:"4か所選択完了！"}</span>
            <button onClick={handleSubmit} disabled={votes.length!==MAX_VOTES||saving} style={{background:votes.length===MAX_VOTES?"linear-gradient(135deg,#a78bfa,#ec4899)":"rgba(255,255,255,0.07)",border:"none",borderRadius:"10px",padding:"10px 26px",color:votes.length===MAX_VOTES?"#fff":"#555",fontSize:"13px",fontWeight:"bold",cursor:votes.length===MAX_VOTES?"pointer":"not-allowed",letterSpacing:"1px",transition:"all 0.3s",boxShadow:votes.length===MAX_VOTES?"0 4px 16px rgba(167,139,250,0.4)":"none"}}>
              {saving?"送信中…":"投票する 🏕️"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ==============================
// 結果ページ
// ==============================
function ResultsPage() {
  const [allVotes, setAllVotes] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [lastUpdated, setLastUpdated] = React.useState(null);

  const fetchVotes = async () => {
    setLoading(true);
    try {
      const v = await loadVotes();
      setAllVotes(v);
      setLastUpdated(new Date());
    } catch { setAllVotes([]); }
    setLoading(false);
  };
  React.useEffect(()=>{ fetchVotes(); },[]);

  const tally = {};
  camps.forEach(c=>{ tally[c.id]=0; });
  allVotes.forEach(v=>{ (v.votes||[]).forEach(id=>{ tally[id]=(tally[id]||0)+1; }); });
  const sorted = [...camps].sort((a,b)=>tally[b.id]-tally[a.id]);
  const maxVotes = Math.max(...Object.values(tally),1);
  const totalVoters = allVotes.length;

  return (
    <div style={{...S.page,background:"linear-gradient(150deg,#060614 0%,#0a1020 60%,#060614 100%)"}}>
      <div style={S.header}>
        <div style={S.label}>CAMP SELECTION 2025</div>
        <h1 style={S.h1result}>📊 投票結果</h1>
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:"14px",flexWrap:"wrap",marginBottom:"10px"}}>
          <span style={{fontSize:"12px",color:"#9b8ea0"}}>参加者 <span style={{color:"#6ee7b7",fontWeight:"bold",fontSize:"18px"}}>{totalVoters}</span> 名</span>
          {lastUpdated&&<span style={{fontSize:"10px",color:"#444"}}>{lastUpdated.toLocaleTimeString("ja-JP")} 更新</span>}
          <button onClick={fetchVotes} style={{background:"rgba(110,231,183,0.12)",border:"1px solid rgba(110,231,183,0.3)",color:"#6ee7b7",borderRadius:"16px",padding:"4px 13px",cursor:"pointer",fontSize:"11px"}}>🔄 更新</button>
        </div>
        <a href="?" style={S.backLink}>← 投票ページへ戻る</a>
      </div>

      <div style={{maxWidth:"800px",margin:"0 auto",padding:"24px 14px 60px"}}>
        {loading?(
          <div style={{textAlign:"center",padding:"60px",color:"#9b8ea0"}}>
            <div style={{fontSize:"32px",marginBottom:"10px"}}>⏳</div>読み込み中…
          </div>
        ):totalVoters===0?(
          <div style={{textAlign:"center",padding:"60px 20px",background:"rgba(255,255,255,0.02)",borderRadius:"16px",border:"1px solid rgba(255,255,255,0.07)"}}>
            <div style={{fontSize:"38px",marginBottom:"10px"}}>🗳️</div>
            <div style={{fontSize:"15px",color:"#9b8ea0",marginBottom:"10px"}}>まだ投票がありません</div>
            <a href="?" style={{fontSize:"13px",color:"#a78bfa",textDecoration:"none"}}>投票ページへ →</a>
          </div>
        ):(
          <>
            {/* ランキング */}
            <div style={{marginBottom:"28px"}}>
              <div style={{fontSize:"10px",letterSpacing:"4px",color:"#9b8ea0",textTransform:"uppercase",marginBottom:"14px",textAlign:"center"}}>RANKING</div>
              {sorted.map((camp,idx)=>{
                const count = tally[camp.id];
                const pct = totalVoters>0?Math.round((count/totalVoters)*100):0;
                const barW = (count/maxVotes)*100;
                const medals = ["🥇","🥈","🥉"];
                const isTop3 = idx<3;
                return (
                  <div key={camp.id} style={{marginBottom:"8px",background:isTop3?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.015)",border:`1px solid ${idx===0?"rgba(255,215,0,0.3)":idx===1?"rgba(192,192,192,0.2)":idx===2?"rgba(205,127,50,0.2)":"rgba(255,255,255,0.06)"}`,borderRadius:"11px",padding:"12px 14px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"9px",marginBottom:"9px"}}>
                      <span style={{fontSize:"18px",minWidth:"26px",textAlign:"center"}}>{isTop3?medals[idx]:<span style={{fontSize:"12px",color:"#555"}}>#{idx+1}</span>}</span>
                      <span style={{fontSize:"18px"}}>{camp.emoji}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:"bold",fontSize:"13px",color:idx===0?"#ffd700":"#f0ede8"}}>{camp.name}</div>
                        <div style={{fontSize:"10px",color:"#9b8ea0"}}>{camp.pref}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:"18px",fontWeight:"bold",color:idx===0?"#ffd700":"#c4b5fd"}}>{count}票</div>
                        <div style={{fontSize:"10px",color:"#9b8ea0"}}>{pct}%</div>
                      </div>
                    </div>
                    <div style={{background:"rgba(255,255,255,0.07)",borderRadius:"3px",height:"5px",overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:"3px",width:`${barW}%`,background:idx===0?"linear-gradient(90deg,#ffd700,#ffaa00)":idx===1?"linear-gradient(90deg,#c0c0c0,#909090)":idx===2?"linear-gradient(90deg,#cd7f32,#a0632a)":"linear-gradient(90deg,#a78bfa,#6366f1)",transition:"width 0.8s ease"}}/>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* 投票者一覧 */}
            <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"14px",padding:"18px"}}>
              <div style={{fontSize:"10px",letterSpacing:"4px",color:"#9b8ea0",textTransform:"uppercase",marginBottom:"14px",textAlign:"center"}}>みんなの選択</div>
              <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                {[...allVotes].sort((a,b)=>a.ts-b.ts).map((voter,i)=>{
                  const chosen = camps.filter(c=>(voter.votes||[]).includes(c.id));
                  return (
                    <div key={i} style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"9px",padding:"11px 13px"}}>
                      <div style={{fontSize:"12px",color:"#a78bfa",marginBottom:"7px",fontWeight:"bold"}}>👤 {voter.name}</div>
                      <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                        {chosen.map(c=>(
                          <span key={c.id} style={{background:"rgba(167,139,250,0.12)",border:"1px solid rgba(167,139,250,0.28)",borderRadius:"6px",padding:"3px 9px",fontSize:"11px"}}>{c.emoji} {c.name}</span>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ==============================
// Root
// ==============================
function App() {
  const [page, setPage] = React.useState(()=>getPage());
  React.useEffect(()=>{
    const h = ()=>setPage(getPage());
    window.addEventListener("popstate",h);
    return ()=>window.removeEventListener("popstate",h);
  },[]);
  return page==="results"?React.createElement(ResultsPage):React.createElement(VotePage);
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>
</body>
</html>

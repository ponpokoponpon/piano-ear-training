<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎹 ピアノ耳練習アプリ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .score-section {
            background: #f0f4ff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .score-row {
            display: flex;
            justify-content: space-around;
            gap: 20px;
        }

        .score-item {
            flex: 1;
        }

        .score-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .game-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .play-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .play-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .play-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .play-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .piano-keys {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .key-button {
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #333;
        }

        .key-button:hover {
            background: #e8e8e8;
            border-color: #667eea;
        }

        .key-button.correct {
            background: #4caf50;
            color: white;
            border-color: #45a049;
            animation: correctPulse 0.6s ease;
        }

        .key-button.incorrect {
            background: #f44336;
            color: white;
            border-color: #da190b;
            animation: incorrectShake 0.5s ease;
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes incorrectShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .settings {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .setting-group {
            margin-bottom: 15px;
        }

        .setting-group:last-child {
            margin-bottom: 0;
        }

        .setting-label {
            font-size: 13px;
            font-weight: bold;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }

        .setting-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .setting-button {
            background: white;
            border: 2px solid #ddd;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            min-width: 60px;
        }

        .setting-button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .feedback {
            min-height: 40px;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            font-size: 16px;
        }

        .feedback.correct-feedback {
            color: #4caf50;
        }

        .feedback.incorrect-feedback {
            color: #f44336;
        }

        .feedback.waiting {
            color: #999;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .piano-keys {
                grid-template-columns: repeat(3, 1fr);
            }

            .play-button {
                padding: 14px 30px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎹 ピアノ耳練習</h1>
        <p class="subtitle">聞こえた音の音程を当てよう</p>

        <div class="score-section">
            <div class="score-row">
                <div class="score-item">
                    <div class="score-label">正解</div>
                    <div class="score-value" id="correctCount">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">不正解</div>
                    <div class="score-value" id="incorrectCount">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">正答率</div>
                    <div class="score-value" id="accuracy">-</div>
                </div>
            </div>
        </div>

        <div class="settings">
            <div class="setting-group">
                <label class="setting-label">難易度</label>
                <div class="setting-buttons">
                    <button class="setting-button active" data-difficulty="easy">初級</button>
                    <button class="setting-button" data-difficulty="normal">中級</button>
                    <button class="setting-button" data-difficulty="hard">上級</button>
                </div>
            </div>
        </div>

        <div class="game-section">
            <button class="play-button" id="playButton">♪ 音を聞く</button>
            <div class="feedback waiting" id="feedback">準備完了！音を聞いて当ててね</div>
        </div>

        <div class="piano-keys" id="pianoKeys"></div>
    </div>

    <script>
        // Web Audio API のセットアップ
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // ゲーム状態
        let gameState = {
            currentNote: null,
            correctCount: 0,
            incorrectCount: 0,
            difficulty: 'easy',
            isPlaying: false,
            isWaiting: false
        };

        // 音階定義
        const notes = {
            'C': 261.63,
            'C#': 277.18,
            'D': 293.66,
            'D#': 311.13,
            'E': 329.63,
            'F': 349.23,
            'F#': 369.99,
            'G': 392.00,
            'G#': 415.30,
            'A': 440.00,
            'A#': 466.16,
            'B': 493.88
        };

        const difficulties = {
            easy: ['C', 'D', 'E', 'F', 'G', 'A', 'B'],
            normal: Object.keys(notes),
            hard: Object.keys(notes)
        };

        // 初期化
        function init() {
            createPianoKeys();
            setupEventListeners();
            playRandomNote();
        }

        // ピアノキーの作成
        function createPianoKeys() {
            const container = document.getElementById('pianoKeys');
            container.innerHTML = '';

            const currentDifficulty = difficulties[gameState.difficulty];
            currentDifficulty.forEach(note => {
                const button = document.createElement('button');
                button.className = 'key-button';
                button.textContent = note;
                button.dataset.note = note;
                button.addEventListener('click', () => guessNote(note));
                container.appendChild(button);
            });
        }

        // イベントリスナー設定
        function setupEventListeners() {
            document.getElementById('playButton').addEventListener('click', playRandomNote);

            document.querySelectorAll('[data-difficulty]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('[data-difficulty]').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    gameState.difficulty = e.target.dataset.difficulty;
                    createPianoKeys();
                });
            });
        }

        // ランダムな音を再生
        function playRandomNote() {
            if (gameState.isPlaying) return;

            gameState.isPlaying = true;
            gameState.isWaiting = true;
            document.getElementById('playButton').disabled = true;
            document.getElementById('feedback').textContent = '♪ 音を再生中...';
            document.getElementById('feedback').className = 'feedback waiting';

            const currentDifficulty = difficulties[gameState.difficulty];
            const randomNote = currentDifficulty[Math.floor(Math.random() * currentDifficulty.length)];
            gameState.currentNote = randomNote;

            playSound(notes[randomNote], 1.0);
        }

        // 音を再生
        function playSound(frequency, duration = 1.0) {
            try {
                const now = audioContext.currentTime;
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';

                // フェードイン
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);

                // フェードアウト
                gainNode.gain.setValueAtTime(0.3, now + duration - 0.2);
                gainNode.gain.linearRampToValueAtTime(0, now + duration);

                oscillator.start(now);
                oscillator.stop(now + duration);

                // 再生完了後の処理
                setTimeout(() => {
                    gameState.isPlaying = false;
                    document.getElementById('playButton').disabled = false;
                    if (!gameState.isWaiting) {
                        document.getElementById('feedback').textContent = '当ててみよう!';
                        document.getElementById('feedback').className = 'feedback waiting';
                    }
                }, duration * 1000);
            } catch (e) {
                console.error('Audio playback error:', e);
                gameState.isPlaying = false;
                document.getElementById('playButton').disabled = false;
            }
        }

        // 音を当てる
        function guessNote(guessedNote) {
            if (gameState.isPlaying || !gameState.currentNote) return;

            gameState.isWaiting = false;
            const feedback = document.getElementById('feedback');
            const buttons = document.querySelectorAll('.key-button');

            // すべてのボタンを無効化
            buttons.forEach(btn => btn.disabled = true);

            if (guessedNote === gameState.currentNote) {
                // 正解
                gameState.correctCount++;
                buttons.forEach(btn => {
                    if (btn.dataset.note === gameState.currentNote) {
                        btn.classList.add('correct');
                    }
                });
                feedback.textContent = '✨ 正解！';
                feedback.className = 'feedback correct-feedback';
                playSound(notes[guessedNote], 0.5);
            } else {
                // 不正解
                gameState.incorrectCount++;
                buttons.forEach(btn => {
                    if (btn.dataset.note === gameState.currentNote) {
                        btn.classList.add('correct');
                    } else if (btn.dataset.note === guessedNote) {
                        btn.classList.add('incorrect');
                    }
                });
                feedback.textContent = `❌ 不正解。正解は ${gameState.currentNote} でした`;
                feedback.className = 'feedback incorrect-feedback';
            }

            updateScore();

            // 2秒後に次の問題へ
            setTimeout(() => {
                buttons.forEach(btn => {
                    btn.disabled = false;
                    btn.classList.remove('correct', 'incorrect');
                });
                playRandomNote();
            }, 2000);
        }

        // スコア更新
        function updateScore() {
            document.getElementById('correctCount').textContent = gameState.correctCount;
            document.getElementById('incorrectCount').textContent = gameState.incorrectCount;

            const total = gameState.correctCount + gameState.incorrectCount;
            if (total > 0) {
                const accuracy = Math.round((gameState.correctCount / total) * 100);
                document.getElementById('accuracy').textContent = accuracy + '%';
            }
        }

        // ゲーム開始
        init();
    </script>
</body>
</html>

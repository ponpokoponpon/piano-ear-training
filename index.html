<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎹 ドレミ音当てゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px 20px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 36px;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        .score-section {
            background: #f0f4ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 14px;
            color: #666;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }

        .game-section {
            margin-bottom: 40px;
        }

        .play-button {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8c42 100%);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 18px 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .play-button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.5);
        }

        .play-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .play-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .feedback {
            min-height: 50px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feedback.correct-feedback {
            color: #4caf50;
            animation: correctBounce 0.6s ease;
        }

        .feedback.incorrect-feedback {
            color: #f44336;
            animation: incorrectShake 0.5s ease;
        }

        .feedback.waiting {
            color: #999;
        }

        @keyframes correctBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes incorrectShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .piano-keys {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .key-button {
            aspect-ratio: 1;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .key-button:hover:not(:disabled) {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .key-button:active:not(:disabled) {
            transform: translateY(-2px);
        }

        .key-button.do {
            background: linear-gradient(135deg, #ff6b6b, #ff5252);
        }

        .key-button.re {
            background: linear-gradient(135deg, #ff8c42, #ff7043);
        }

        .key-button.mi {
            background: linear-gradient(135deg, #ffd93d, #ffb74d);
        }

        .key-button.fa {
            background: linear-gradient(135deg, #6bcf7f, #4caf50);
        }

        .key-button.so {
            background: linear-gradient(135deg, #4ecdc4, #26c6da);
        }

        .key-button.ra {
            background: linear-gradient(135deg, #667eea, #5c6bc0);
        }

        .key-button.si {
            background: linear-gradient(135deg, #d946ef, #c2185b);
        }

        .key-button.correct {
            animation: correctPulse 0.6s ease;
        }

        .key-button.incorrect {
            animation: incorrectShake 0.5s ease;
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .key-name {
            font-size: 12px;
            margin-top: 3px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 15px;
            }

            h1 {
                font-size: 28px;
            }

            .subtitle {
                font-size: 16px;
            }

            .play-button {
                padding: 16px 40px;
                font-size: 18px;
            }

            .score-section {
                flex-direction: column;
                gap: 15px;
            }

            .piano-keys {
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎹 ドレミ音当てゲーム</h1>
        <p class="subtitle">聞こえた音を当ててね！</p>

        <div class="score-section">
            <div class="score-item">
                <div class="score-label">正解 ✨</div>
                <div class="score-value" id="correctCount">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">不正解 ❌</div>
                <div class="score-value" id="incorrectCount">0</div>
            </div>
        </div>

        <div class="game-section">
            <button class="play-button" id="playButton">♪ 音を聞く ♪</button>
            <div class="feedback waiting" id="feedback">準備完了！音を聞いてね</div>
        </div>

        <div class="piano-keys" id="pianoKeys"></div>
    </div>

    <script>
        // Web Audio API セットアップ
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // ゲーム状態
        let gameState = {
            currentNote: null,
            correctCount: 0,
            incorrectCount: 0,
            isPlaying: false,
            isWaiting: false
        };

        // ドレミファソラシドの周波数
        const notes = {
            'ド': { freq: 261.63, class: 'do', index: 0 },
            'レ': { freq: 293.66, class: 're', index: 1 },
            'ミ': { freq: 329.63, class: 'mi', index: 2 },
            'ファ': { freq: 349.23, class: 'fa', index: 3 },
            'ソ': { freq: 392.00, class: 'so', index: 4 },
            'ラ': { freq: 440.00, class: 'ra', index: 5 },
            'シ': { freq: 493.88, class: 'si', index: 6 }
        };

        const noteNames = ['ド', 'レ', 'ミ', 'ファ', 'ソ', 'ラ', 'シ'];

        // 初期化
        function init() {
            createPianoKeys();
            setupEventListeners();
            playRandomNote();
        }

        // ピアノキーの作成
        function createPianoKeys() {
            const container = document.getElementById('pianoKeys');
            container.innerHTML = '';

            noteNames.forEach(name => {
                const noteInfo = notes[name];
                const button = document.createElement('button');
                button.className = `key-button ${noteInfo.class}`;
                button.innerHTML = `<span>${name}</span><span class="key-name"></span>`;
                button.dataset.note = name;
                button.addEventListener('click', () => guessNote(name));
                container.appendChild(button);
            });
        }

        // イベントリスナー設定
        function setupEventListeners() {
            document.getElementById('playButton').addEventListener('click', playRandomNote);
        }

        // ランダムな音を再生
        function playRandomNote() {
            if (gameState.isPlaying) return;

            gameState.isPlaying = true;
            gameState.isWaiting = true;
            document.getElementById('playButton').disabled = true;
            document.getElementById('feedback').textContent = '♪ 音を再生中...';
            document.getElementById('feedback').className = 'feedback waiting';

            const randomNote = noteNames[Math.floor(Math.random() * noteNames.length)];
            gameState.currentNote = randomNote;

            playSound(notes[randomNote].freq, 1.0);
        }

        // 音を再生
        function playSound(frequency, duration = 1.0) {
            try {
                const now = audioContext.currentTime;
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';

                // フェードイン
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);

                // フェードアウト
                gainNode.gain.setValueAtTime(0.3, now + duration - 0.2);
                gainNode.gain.linearRampToValueAtTime(0, now + duration);

                oscillator.start(now);
                oscillator.stop(now + duration);

                // 再生完了後の処理
                setTimeout(() => {
                    gameState.isPlaying = false;
                    document.getElementById('playButton').disabled = false;
                    if (!gameState.isWaiting) {
                        document.getElementById('feedback').textContent = '当ててみてね！';
                        document.getElementById('feedback').className = 'feedback waiting';
                    }
                }, duration * 1000);
            } catch (e) {
                console.error('Audio playback error:', e);
                gameState.isPlaying = false;
                document.getElementById('playButton').disabled = false;
            }
        }

        // 音を当てる
        function guessNote(guessedNote) {
            if (gameState.isPlaying || !gameState.currentNote) return;

            gameState.isWaiting = false;
            const feedback = document.getElementById('feedback');
            const buttons = document.querySelectorAll('.key-button');

            // すべてのボタンを無効化
            buttons.forEach(btn => btn.disabled = true);

            if (guessedNote === gameState.currentNote) {
                // 正解
                gameState.correctCount++;
                buttons.forEach(btn => {
                    if (btn.dataset.note === gameState.currentNote) {
                        btn.classList.add('correct');
                    }
                });
                feedback.textContent = '✨ せいかい！';
                feedback.className = 'feedback correct-feedback';
                playSound(notes[guessedNote].freq, 0.5);
            } else {
                // 不正解
                gameState.incorrectCount++;
                buttons.forEach(btn => {
                    if (btn.dataset.note === gameState.currentNote) {
                        btn.classList.add('correct');
                    } else if (btn.dataset.note === guessedNote) {
                        btn.classList.add('incorrect');
                    }
                });
                feedback.textContent = `❌ ざんねん。正解は「${gameState.currentNote}」でした`;
                feedback.className = 'feedback incorrect-feedback';
            }

            updateScore();

            // 2秒後に次の問題へ
            setTimeout(() => {
                buttons.forEach(btn => {
                    btn.disabled = false;
                    btn.classList.remove('correct', 'incorrect');
                });
                playRandomNote();
            }, 2000);
        }

        // スコア更新
        function updateScore() {
            document.getElementById('correctCount').textContent = gameState.correctCount;
            document.getElementById('incorrectCount').textContent = gameState.incorrectCount;
        }

        // ゲーム開始
        init();
    </script>
</body>
</html>

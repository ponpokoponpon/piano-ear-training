<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <title>🎹 ドレミ音当てゲーム</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', 'MS Gothic', sans-serif; background: #e8e4d0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .container { background: white; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 30px 20px 40px 20px; max-width: 500px; width: 100%; text-align: center; }
        .title-image { margin-bottom: 30px; text-align: center; }
        .title-image img { max-width: 100%; max-height: 100px; object-fit: contain; }
        h1 { font-size: 36px; color: #333; margin-bottom: 10px; }
        .subtitle { font-size: 18px; color: #666; margin-bottom: 15px; }
        .difficulty-section { background: rgba(156, 126, 111, 0.1); border-radius: 15px; padding: 15px; margin-bottom: 25px; border: 2px solid #9c7e6f; }
        .difficulty-label { font-size: 13px; font-weight: bold; color: #666; margin-bottom: 10px; }
        .difficulty-buttons { display: flex; gap: 10px; justify-content: center; }
        .difficulty-btn { background: white; border: 2px solid #9c7e6f; border-radius: 8px; padding: 8px 20px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; color: #666; }
        .difficulty-btn.active { background: #9c7e6f; color: white; border-color: #9c7e6f; }
        .difficulty-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(156, 126, 111, 0.2); }
        .piano-icon { font-size: 60px; margin-bottom: 15px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .score-section { background: rgba(255,255,255,0.7); border-radius: 15px; padding: 20px; margin-bottom: 30px; display: flex; justify-content: space-around; align-items: center; border: 2px solid #9c7e6f; }
        .score-item { text-align: center; }
        .score-label { font-size: 14px; color: #666; font-weight: bold; margin-bottom: 5px; }
        .score-value { font-size: 36px; font-weight: bold; color: #9c7e6f; }
        .game-section { margin-bottom: 40px; }
        .play-button { background: linear-gradient(135deg, #9c7e6f 0%, #8b6f47 100%); color: white; border: none; border-radius: 20px; padding: 18px 50px; font-size: 20px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(156,126,111,0.3); }
        .play-button:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(156,126,111,0.5); }
        .play-button:active:not(:disabled) { transform: translateY(0); }
        .play-button:disabled { opacity: 0.6; cursor: not-allowed; }
        .feedback { min-height: 50px; font-size: 24px; font-weight: bold; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; }
        .feedback.correct-feedback { color: #4caf50; animation: correctBounce 0.6s ease; }
        .feedback.incorrect-feedback { color: #f44336; animation: incorrectShake 0.5s ease; }
        .feedback.waiting { color: #999; }
        @keyframes correctBounce { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes incorrectShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .piano-keys { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 20px; }
        .piano-keys.keys-12 { grid-template-columns: repeat(4, 1fr); }
        .key-button { aspect-ratio: 1; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .key-button:hover:not(:disabled) { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .key-button.do { background: linear-gradient(135deg, #ff6b6b, #ff5252); }
        .key-button.re { background: linear-gradient(135deg, #ff8c42, #ff7043); }
        .key-button.mi { background: linear-gradient(135deg, #ffd93d, #ffb74d); }
        .key-button.fa { background: linear-gradient(135deg, #6bcf7f, #4caf50); }
        .key-button.so { background: linear-gradient(135deg, #4ecdc4, #26c6da); }
        .key-button.ra { background: linear-gradient(135deg, #667eea, #5c6bc0); }
        .key-button.si { background: linear-gradient(135deg, #d946ef, #c2185b); }
        .key-button.correct { animation: correctPulse 0.6s ease; filter: brightness(1.3); }
        .key-button.incorrect { opacity: 0.4; filter: grayscale(60%); }
        .key-button.selected { border: 3px solid #333; transform: scale(0.95); box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        @keyframes correctPulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        .submit-button { background: linear-gradient(135deg, #4caf50 0%, #388e3c 100%); color: white; border: none; border-radius: 20px; padding: 14px 40px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; margin-top: 20px; box-shadow: 0 5px 15px rgba(76,175,80,0.3); }
        .submit-button:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(76,175,80,0.5); }
        .submit-button:active:not(:disabled) { transform: translateY(0); }
        .submit-button:disabled { opacity: 0.6; cursor: not-allowed; }
        .key-stats { font-size: 10px; margin-top: 2px; opacity: 0.9; font-weight: normal; }
        #selectionCount { font-size: 14px; color: #666; margin-top: 10px; min-height: 20px; }
        .next-button { background: linear-gradient(135deg, #9c7e6f 0%, #8b6f47 100%); color: white; border: none; border-radius: 20px; padding: 14px 40px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; margin-top: 15px; box-shadow: 0 5px 15px rgba(156,126,111,0.3); display: none; }
        .next-button:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(156,126,111,0.5); }
        .next-button.visible { display: inline-block; }
        .stats-section { background: rgba(255,255,255,0.6); border-radius: 15px; padding: 20px; margin-top: 30px; border: 2px solid #9c7e6f; }
        .stats-title { font-size: 16px; font-weight: bold; color: #8b6f47; margin-bottom: 15px; }
        .reset-button { background: none; border: 1px solid #ccc; border-radius: 8px; padding: 4px 12px; font-size: 12px; color: #999; cursor: pointer; margin-left: 10px; }
        .reset-button:hover { border-color: #f44336; color: #f44336; }
        .stats-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .stats-grid.stats-12 { grid-template-columns: repeat(4, 1fr); }
        .stat-item { background: white; border-radius: 10px; padding: 10px; border: 2px solid #9c7e6f; }
        .stat-note { font-size: 14px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .stat-correct { color: #4caf50; font-size: 12px; font-weight: bold; }
        .stat-incorrect { color: #f44336; font-size: 12px; font-weight: bold; }
        .stat-rate { font-size: 11px; color: #666; margin-top: 3px; }
        @media (max-width: 480px) { .container { padding: 20px 15px 40px 15px; } h1 { font-size: 28px; } .difficulty-buttons { flex-wrap: wrap; } .difficulty-btn { padding: 6px 16px; font-size: 12px; } .piano-keys { grid-template-columns: repeat(4, 1fr); } .piano-keys.keys-12 { grid-template-columns: repeat(4, 1fr); } .play-button { padding: 16px 40px; font-size: 18px; } .score-section { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-image">
            <img src="images/title.png" alt="ピアノ&リトミック教室 Waltz">
        </div>
        <div class="piano-icon">🎹</div>
        <h1>ドレミ音当てゲーム</h1>
        <p class="subtitle" id="subtitle">聞こえた音を当ってね！</p>
        <div class="difficulty-section">
            <div class="difficulty-label">難易度を選択</div>
            <div class="difficulty-buttons">
                <button class="difficulty-btn active" data-difficulty="easy">初級</button>
                <button class="difficulty-btn" data-difficulty="normal">中級</button>
                <button class="difficulty-btn" data-difficulty="hard">上級</button>
            </div>
        </div>
        <div class="score-section">
            <div class="score-item"><div class="score-label">正解 ✨</div><div class="score-value" id="correctCount">0</div></div>
            <div class="score-item"><div class="score-label">不正解 ❌</div><div class="score-value" id="incorrectCount">0</div></div>
            <div class="score-item"><div class="score-label">正答率 📊</div><div class="score-value" id="accuracy">-</div></div>
        </div>
        <div class="game-section">
            <button class="play-button" id="playButton">♪ 音を聞く ♪</button>
            <div class="feedback waiting" id="feedback">準備完了！音を聞いてね</div>
        </div>
        <div class="piano-keys" id="pianoKeys"></div>
        <button class="submit-button" id="submitButton">回答する</button>
        <div id="selectionCount"></div>
        <button class="next-button" id="nextButton">次の問題へ →</button>
        <div class="stats-section">
            <div class="stats-title">🎵 各音の成績<button class="reset-button" id="resetStats">リセット</button></div>
            <div class="stats-grid" id="statsGrid"></div>
        </div>
    </div>
    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const HARMONICS = [{ ratio: 1, volume: 0.4 }, { ratio: 2, volume: 0.2 }, { ratio: 3, volume: 0.1 }, { ratio: 4, volume: 0.08 }];
        let gameState = { currentNote: null, currentChord: null, selectedNotes: [], correctCount: 0, incorrectCount: 0, isPlaying: false, noteStats: {}, difficulty: 'easy' };
        let pendingTimeout = null;
        const notes = {
            'ド': { freq: 261.63, class: 'do' },
            'ド#': { freq: 277.18, class: 'do' },
            'レ': { freq: 293.66, class: 're' },
            'レ#': { freq: 311.13, class: 're' },
            'ミ': { freq: 329.63, class: 'mi' },
            'ファ': { freq: 349.23, class: 'fa' },
            'ファ#': { freq: 369.99, class: 'fa' },
            'ソ': { freq: 392.00, class: 'so' },
            'ソ#': { freq: 415.30, class: 'so' },
            'ラ': { freq: 440.00, class: 'ra' },
            'ラ#': { freq: 466.16, class: 'ra' },
            'シ': { freq: 493.88, class: 'si' }
        };
        const difficulties = {
            easy: ['ド', 'レ', 'ミ', 'ファ', 'ソ', 'ラ', 'シ'],
            normal: ['ド', 'ド#', 'レ', 'レ#', 'ミ', 'ファ', 'ファ#', 'ソ', 'ソ#', 'ラ', 'ラ#', 'シ'],
            hard: ['ド', 'ド#', 'レ', 'レ#', 'ミ', 'ファ', 'ファ#', 'ソ', 'ソ#', 'ラ', 'ラ#', 'シ']
        };
        const allNotes = ['ド', 'ド#', 'レ', 'レ#', 'ミ', 'ファ', 'ファ#', 'ソ', 'ソ#', 'ラ', 'ラ#', 'シ'];
        function getMajorChord(rootNote) {
            const rootIndex = allNotes.indexOf(rootNote);
            const thirdNote = allNotes[(rootIndex + 4) % 12];
            const fifthNote = allNotes[(rootIndex + 7) % 12];
            return [rootNote, thirdNote, fifthNote];
        }
        function init() {
            allNotes.forEach(name => { gameState.noteStats[name] = { correct: 0, incorrect: 0 }; });
            loadStats();
            createPianoKeys();
            updateStatsDisplay();
            updateScore();
            setupEventListeners();
            updateSubtitle();
        }
        function setupEventListeners() {
            document.getElementById('playButton').addEventListener('click', playRandomNote);
            document.getElementById('submitButton').addEventListener('click', submitAnswer);
            document.getElementById('nextButton').addEventListener('click', goToNext);
            document.getElementById('resetStats').addEventListener('click', () => {
                allNotes.forEach(name => { gameState.noteStats[name] = { correct: 0, incorrect: 0 }; });
                gameState.correctCount = 0;
                gameState.incorrectCount = 0;
                localStorage.removeItem(`piano_stats_${gameState.difficulty}`);
                updateScore();
                updateKeyStats();
                updateStatsDisplay();
            });
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    gameState.difficulty = e.target.dataset.difficulty;
                    gameState.correctCount = 0;
                    gameState.incorrectCount = 0;
                    gameState.selectedNotes = [];
                    gameState.currentNote = null;
                    gameState.currentChord = null;
                    gameState.isPlaying = false;
                    if (pendingTimeout) { clearTimeout(pendingTimeout); pendingTimeout = null; }
                    allNotes.forEach(name => { gameState.noteStats[name] = { correct: 0, incorrect: 0 }; });
                    document.getElementById('correctCount').textContent = '0';
                    document.getElementById('incorrectCount').textContent = '0';
                    document.getElementById('accuracy').textContent = '-';
                    document.getElementById('playButton').disabled = false;
                    updatePlayButton();
                    const fb = document.getElementById('feedback');
                    fb.textContent = '準備完了！音を聞いてね';
                    fb.className = 'feedback waiting';
                    updateSubtitle();
                    createPianoKeys();
                    updateStatsDisplay();
                });
            });
        }
        function saveStats() {
            const key = `piano_stats_${gameState.difficulty}`;
            localStorage.setItem(key, JSON.stringify(gameState.noteStats));
        }
        function loadStats() {
            const key = `piano_stats_${gameState.difficulty}`;
            const saved = localStorage.getItem(key);
            if (saved) {
                const parsed = JSON.parse(saved);
                allNotes.forEach(name => {
                    if (parsed[name]) gameState.noteStats[name] = parsed[name];
                });
                const totals = Object.values(gameState.noteStats).reduce((a, s) => ({ correct: a.correct + s.correct, incorrect: a.incorrect + s.incorrect }), { correct: 0, incorrect: 0 });
                gameState.correctCount = totals.correct;
                gameState.incorrectCount = totals.incorrect;
            }
        }
        function goToNext() {
            document.getElementById('nextButton').classList.remove('visible');
            document.querySelectorAll('.key-button').forEach(btn => { btn.disabled = false; btn.classList.remove('correct', 'incorrect', 'selected'); });
            gameState.currentNote = null;
            gameState.currentChord = null;
            clearSelection();
            playRandomNote();
        }
        function showNextButton() {
            document.getElementById('nextButton').classList.add('visible');
        }
        function updatePlayButton() {
            const btn = document.getElementById('playButton');
            btn.textContent = gameState.currentNote ? '↩ もう一度聞く' : '♪ 音を聞く ♪';
        }
        function updateSubtitle() {
            const subtitles = { easy: '聞こえた音を当ってね！', normal: '聞こえた音を当ってね！', hard: 'メジャーコードの3つの音を選んでね！' };
            document.getElementById('subtitle').textContent = subtitles[gameState.difficulty];
        }
        function createPianoKeys() {
            const container = document.getElementById('pianoKeys');
            container.innerHTML = '';
            const currentNotes = gameState.difficulty === 'hard' ? allNotes : difficulties[gameState.difficulty];
            const is12 = currentNotes.length > 7;
            container.className = `piano-keys${is12 ? ' keys-12' : ''}`;
            currentNotes.forEach(name => {
                const noteInfo = notes[name];
                const button = document.createElement('button');
                button.className = `key-button ${noteInfo.class}`;
                button.innerHTML = `<span>${name}</span><span class="key-stats" data-note-stat="${name}"></span>`;
                button.dataset.note = name;
                button.addEventListener('click', () => toggleNoteSelection(name));
                container.appendChild(button);
            });
            updateKeyStats();
            clearSelection();
        }
        function updateKeyStats() {
            allNotes.forEach(name => {
                const stats = gameState.noteStats[name];
                const statEl = document.querySelector(`[data-note-stat="${name}"]`);
                if (statEl) statEl.textContent = stats.correct + stats.incorrect > 0 ? `✓${stats.correct} ✗${stats.incorrect}` : '';
            });
        }
        function toggleNoteSelection(noteName) {
            if (gameState.isPlaying || !gameState.currentNote) return;
            const index = gameState.selectedNotes.indexOf(noteName);
            if (index > -1) {
                gameState.selectedNotes.splice(index, 1);
            } else {
                if (gameState.difficulty === 'hard') {
                    if (gameState.selectedNotes.length < 3) gameState.selectedNotes.push(noteName);
                } else {
                    gameState.selectedNotes = [noteName];
                }
            }
            updateSelectionDisplay();
        }
        function clearSelection() {
            gameState.selectedNotes = [];
            updateSelectionDisplay();
        }
        function updateSelectionDisplay() {
            document.querySelectorAll('.key-button').forEach(btn => {
                if (gameState.selectedNotes.includes(btn.dataset.note)) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });
            const counter = document.getElementById('selectionCount');
            if (gameState.difficulty === 'hard' && gameState.currentNote) {
                const n = gameState.selectedNotes.length;
                counter.textContent = `選択中: ${n} / 3${n === 3 ? ' ✓' : ''}`;
                counter.style.color = n === 3 ? '#4caf50' : '#666';
            } else {
                counter.textContent = '';
            }
        }
        function updateStatsDisplay() {
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = '';
            const currentNotes = gameState.difficulty === 'hard' ? allNotes : difficulties[gameState.difficulty];
            const is12 = currentNotes.length > 7;
            grid.className = `stats-grid${is12 ? ' stats-12' : ''}`;
            currentNotes.forEach(name => {
                const stats = gameState.noteStats[name];
                const total = stats.correct + stats.incorrect;
                const rate = total > 0 ? Math.round((stats.correct / total) * 100) : '-';
                const item = document.createElement('div');
                item.className = 'stat-item';
                item.innerHTML = `<div class="stat-note">${name}</div><div class="stat-correct">✓ ${stats.correct}</div><div class="stat-incorrect">✗ ${stats.incorrect}</div><div class="stat-rate">${rate}${total > 0 ? '%' : ''}</div>`;
                grid.appendChild(item);
            });
        }
        function playRandomNote() {
            if (gameState.isPlaying) return;
            gameState.isPlaying = true;
            document.getElementById('playButton').disabled = true;
            document.getElementById('feedback').textContent = '♪ 音を再生中...';
            document.getElementById('feedback').className = 'feedback waiting';
            const currentNotes = gameState.difficulty === 'hard' ? allNotes : difficulties[gameState.difficulty];
            if (!gameState.currentNote) gameState.currentNote = currentNotes[Math.floor(Math.random() * currentNotes.length)];
            updatePlayButton();
            if (gameState.difficulty === 'hard') {
                gameState.currentChord = getMajorChord(gameState.currentNote);
                playChord(gameState.currentChord, 1.5);
            } else {
                playPianoSound(notes[gameState.currentNote].freq, 1.5);
            }
        }
        function submitAnswer() {
            if (gameState.isPlaying || !gameState.currentNote || gameState.selectedNotes.length === 0) return;
            if (gameState.difficulty === 'hard' && gameState.selectedNotes.length !== 3) return;
            if (gameState.difficulty === 'hard') {
                checkChordAnswer();
            } else {
                checkAnswer();
            }
        }
        function checkAnswer() {
            const guessedNote = gameState.selectedNotes[0];
            const isCorrect = guessedNote === gameState.currentNote;
            const feedback = document.getElementById('feedback');
            const buttons = document.querySelectorAll('.key-button');
            buttons.forEach(btn => btn.disabled = true);
            if (isCorrect) {
                gameState.correctCount++;
                gameState.noteStats[gameState.currentNote].correct++;
                buttons.forEach(btn => { if (btn.dataset.note === gameState.currentNote) btn.classList.add('correct'); });
                feedback.textContent = '✨ せいかい！';
                feedback.className = 'feedback correct-feedback';
                playSuccessSound();
            } else {
                gameState.incorrectCount++;
                gameState.noteStats[gameState.currentNote].incorrect++;
                buttons.forEach(btn => {
                    if (btn.dataset.note === gameState.currentNote) btn.classList.add('correct');
                    else if (btn.dataset.note === guessedNote) btn.classList.add('incorrect');
                });
                feedback.textContent = `❌ ざんねん。正解は「${gameState.currentNote}」でした`;
                feedback.className = 'feedback incorrect-feedback';
                playFailureSound();
            }
            updateScore();
            updateKeyStats();
            updateStatsDisplay();
            showNextButton();
        }
        function checkChordAnswer() {
            const selectedSet = new Set(gameState.selectedNotes.sort());
            const correctSet = new Set(gameState.currentChord.sort());
            const isCorrect = selectedSet.size === correctSet.size && [...selectedSet].every(note => correctSet.has(note));
            const feedback = document.getElementById('feedback');
            const buttons = document.querySelectorAll('.key-button');
            buttons.forEach(btn => btn.disabled = true);
            if (isCorrect) {
                gameState.correctCount++;
                gameState.noteStats[gameState.currentNote].correct++;
                gameState.currentChord.forEach(note => {
                    buttons.forEach(btn => { if (btn.dataset.note === note) btn.classList.add('correct'); });
                });
                feedback.textContent = `✨ せいかい！（根音：${gameState.currentNote}）`;
                feedback.className = 'feedback correct-feedback';
                playSuccessSound();
            } else {
                gameState.incorrectCount++;
                gameState.noteStats[gameState.currentNote].incorrect++;
                gameState.currentChord.forEach(note => {
                    buttons.forEach(btn => { if (btn.dataset.note === note) btn.classList.add('correct'); });
                });
                gameState.selectedNotes.forEach(note => {
                    if (!gameState.currentChord.includes(note)) {
                        buttons.forEach(btn => { if (btn.dataset.note === note) btn.classList.add('incorrect'); });
                    }
                });
                feedback.textContent = `❌ ざんねん。正解は「${gameState.currentChord.join(' ')}」でした`;
                feedback.className = 'feedback incorrect-feedback';
                playFailureSound();
            }
            updateScore();
            updateKeyStats();
            updateStatsDisplay();
            showNextButton();
        }
        function playChord(chordNotes, duration = 1.5) {
            try {
                const now = audioContext.currentTime;
                const gainNode = audioContext.createGain();
                gainNode.connect(audioContext.destination);
                chordNotes.forEach(noteName => {
                    const frequency = notes[noteName].freq;
                    HARMONICS.forEach(harmonic => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(gainNode);
                        osc.frequency.value = frequency * harmonic.ratio;
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0, now);
                        gain.gain.linearRampToValueAtTime(harmonic.volume, now + 0.05);
                        gain.gain.exponentialRampToValueAtTime(0.1, now + duration * 0.3);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                        osc.start(now);
                        osc.stop(now + duration);
                    });
                });
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + duration);
                setTimeout(() => {
                    gameState.isPlaying = false;
                    document.getElementById('playButton').disabled = false;
                }, duration * 1000);
            } catch (e) {
                gameState.isPlaying = false;
                document.getElementById('playButton').disabled = false;
            }
        }
        function playPianoSound(frequency, duration = 1.5) {
            try {
                const now = audioContext.currentTime;
                const gainNode = audioContext.createGain();
                gainNode.connect(audioContext.destination);
                HARMONICS.forEach(harmonic => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(gainNode);
                    osc.frequency.value = frequency * harmonic.ratio;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(harmonic.volume, now + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.1, now + duration * 0.3);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                    osc.start(now);
                    osc.stop(now + duration);
                });
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + duration);
                setTimeout(() => {
                    gameState.isPlaying = false;
                    document.getElementById('playButton').disabled = false;
                }, duration * 1000);
            } catch (e) {
                gameState.isPlaying = false;
                document.getElementById('playButton').disabled = false;
            }
        }
        function playSuccessSound() {
            try {
                const now = audioContext.currentTime;
                const gainNode = audioContext.createGain();
                gainNode.connect(audioContext.destination);
                [880, 1100, 1320].forEach((freq, index) => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(gainNode);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                    osc.start(now + index * 0.1);
                    osc.stop(now + 0.6 + index * 0.1);
                });
                gainNode.gain.setValueAtTime(0.4, now);
            } catch (e) {}
        }
        function playFailureSound() {
            try {
                const now = audioContext.currentTime;
                const gainNode = audioContext.createGain();
                gainNode.connect(audioContext.destination);
                [200, 150].forEach(freq => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(gainNode);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.15, now + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                });
                gainNode.gain.setValueAtTime(0.3, now);
            } catch (e) {}
        }
        function updateScore() {
            document.getElementById('correctCount').textContent = gameState.correctCount;
            document.getElementById('incorrectCount').textContent = gameState.incorrectCount;
            const total = gameState.correctCount + gameState.incorrectCount;
            document.getElementById('accuracy').textContent = total > 0 ? Math.round((gameState.correctCount / total) * 100) + '%' : '-';
            saveStats();
        }
        init();
    </script>
</body>
